name: Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version e.g. 0.1.0'
        required: true
        type: string
      configuration:
        description: 'Build configuration'
        required: true
        default: 'Release'
        type: choice
        options:
          - Debug
          - Release

permissions:
  contents: write

env:
  VCPKG_DEFAULT_TRIPLET: x64-windows
  VCPKG_ROOT: C:\vcpkg

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Cache vcpkg packages
        id: vcpkg-cache
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-x64-windows-${{ hashFiles('vcpkg-overlay/**') }}
          restore-keys: vcpkg-x64-windows-

      - name: Bootstrap vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat

      - name: Install dependencies via vcpkg
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        run: |
          C:\vcpkg\vcpkg.exe install libtcod:x64-windows sol2:x64-windows lua:x64-windows --overlay-ports=${{ github.workspace }}/vcpkg-overlay/ports

      - name: Integrate vcpkg
        run: C:\vcpkg\vcpkg.exe integrate install

      - name: Build solution
        run: msbuild 40kRL.sln /p:Configuration=${{ inputs.configuration }} /p:Platform=x64

      - name: Copy runtime DLLs
        run: |
          $outDir = "x64\${{ inputs.configuration }}"
          $vcpkgBin = "C:\vcpkg\installed\x64-windows\bin"
          $vcpkgDbgBin = "C:\vcpkg\installed\x64-windows\debug\bin"
          if ("${{ inputs.configuration }}" -eq "Debug") {
            Copy-Item "$vcpkgDbgBin\*.dll" "$outDir\" -Force -ErrorAction SilentlyContinue
          }
          Copy-Item "$vcpkgBin\*.dll" "$outDir\" -Force -ErrorAction SilentlyContinue
          if (-not (Test-Path "$outDir\SDL3.dll")) {
            Write-Error "SDL3.dll not found in $outDir"
            exit 1
          }

      - name: Run tests
        timeout-minutes: 5
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: |
          $testExe = "x64\${{ inputs.configuration }}\40kRL_Tests.exe"
          if (Test-Path $testExe) {
            & $testExe --reporter compact "~[pbt]"
          } else {
            Write-Error "Test executable not found at $testExe"
            exit 1
          }

      - name: Set artifact name
        shell: bash
        run: |
          REF_SAFE=$(echo "${{ github.ref_name }}" | tr '/' '-')
          echo "ARTIFACT_NAME=40kRL-${REF_SAFE}-${{ inputs.configuration }}" >> $GITHUB_ENV

      - name: Stage release files
        run: |
          New-Item -ItemType Directory -Force -Path release
          Copy-Item "x64\${{ inputs.configuration }}\40kRL.exe" release\
          Copy-Item "x64\${{ inputs.configuration }}\*.dll" release\ -Force
          Copy-Item Scripts release\Scripts\ -Recurse -Force
          Copy-Item menu_background1.png release\
          Copy-Item terminal.png release\
          # Copy MSVC runtime redistributable DLLs
          $vcRedist = Get-ChildItem "C:\Program Files\Microsoft Visual Studio\*\*\VC\Redist\MSVC\*\x64\Microsoft.VC*.CRT" -Directory -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($vcRedist) {
            Copy-Item "$($vcRedist.FullName)\vcruntime140.dll" release\ -ErrorAction SilentlyContinue
            Copy-Item "$($vcRedist.FullName)\vcruntime140_1.dll" release\ -ErrorAction SilentlyContinue
            Copy-Item "$($vcRedist.FullName)\msvcp140.dll" release\ -ErrorAction SilentlyContinue
          }
          # Copy libtcod data files if present
          if (Test-Path "C:\vcpkg\installed\x64-windows\share\libtcod\data") {
            Copy-Item "C:\vcpkg\installed\x64-windows\share\libtcod\data\*" release\ -Recurse -Force -ErrorAction SilentlyContinue
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: release/

      - name: Zip release folder
        run: Compress-Archive -Path release\* -DestinationPath 40kRL-${{ inputs.version }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          files: 40kRL-${{ inputs.version }}.zip
          generate_release_notes: true
