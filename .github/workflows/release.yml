name: Release Build

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        required: true
        default: 'Release'
        type: choice
        options:
          - Debug
          - Release

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build game
        run: msbuild 40kRL.sln /p:Configuration=${{ inputs.configuration }} /p:Platform=x64

      - name: Build tests
        run: msbuild Tests\40kRL_Tests.vcxproj /p:Configuration=${{ inputs.configuration }} /p:Platform=x64

      - name: Run tests
        run: x64\${{ inputs.configuration }}\40kRL_Tests.exe --reporter console

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 40kRL-${{ github.ref_name }}-${{ inputs.configuration }}
          path: |
            x64/${{ inputs.configuration }}/40kRL.exe
            x64/${{ inputs.configuration }}/*.dll
            Scripts/
            menu_background1.png
            terminal.png
