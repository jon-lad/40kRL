name: CI

# Temporarily disabled — requires libtcod upgrade from 1.15.0 to latest vcpkg version.
# See .kiro/specs/ for the planned libtcod-upgrade spec.
on:
  workflow_dispatch:  # manual trigger only until libtcod is upgraded

jobs:
  build-and-test:
    runs-on: windows-latest

    strategy:
      matrix:
        configuration: [Debug, Release]
        platform: [x64]

    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Bootstrap vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat

      - name: Install dependencies via vcpkg
        run: |
          C:\vcpkg\vcpkg.exe install libtcod:x64-windows sol2:x64-windows lua:x64-windows

      - name: Integrate vcpkg
        run: C:\vcpkg\vcpkg.exe integrate install

      - name: Build game
        run: msbuild 40kRL.sln /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }}

      - name: Build tests
        run: msbuild Tests\40kRL_Tests.vcxproj /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }}

      - name: Run tests
        run: |
          $testExe = "Tests\${{ matrix.platform }}\${{ matrix.configuration }}\40kRL_Tests.exe"
          if (Test-Path $testExe) {
            & $testExe --reporter compact
          } else {
            Write-Error "Test executable not found at $testExe"
            exit 1
          }
